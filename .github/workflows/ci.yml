name: CI

on: [push]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Cypress Tests
        uses: cypress-io/github-action@v5
        with:
          start: 'npm run dev'
          build: ''
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Cypress Result
          path: |
            cypress/videos
            cypress/screenshots
            cypress/results
          if-no-files-found: ignore
